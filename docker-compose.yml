services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/adhd.db
      - PORT=3001
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
